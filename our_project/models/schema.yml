version: 2

models:
  - name: fact_order_items
    description: "A transactional fact table capturing individual line-item sales from the Olist e-commerce dataset."
    columns:
      - name: order_id
        description: "The unique identifier for the overall order transaction."
        tests:
          - not_null  # Ensures there are no missing order IDs

      - name: order_item_id
        description: "The sequential line-number identifier for an item within an order."
        tests:
          - not_null

      - name: product_id
        description: "The foreign key linking to the products dimension table."
        tests:
          - not_null

      - name: price
        description: "The base cost of the individual product item."
        tests:
          - not_null

      - name: total_item_cost
        description: "The calculated total cost including the base product price and freight value."

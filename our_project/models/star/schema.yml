version: 2

models:
  - name: fact_order_items
    description: "One row per order line item. Core revenue fact table."
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: total_item_cost
        tests: [not_null]

  - name: fact_orders
    description: "One row per order with delivery times, review score, and total payment."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]

  - name: dim_customers
    description: "One row per customer_id. Clean records only."
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: dim_products
    description: "One row per product with English category name."
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: category_name_english
        tests: [not_null]

  - name: dim_sellers
    description: "One row per seller."
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: dim_dates
    description: "Date dimension generated from 2016-01-01 to 2018-12-31."
    columns:
      - name: date_id
        tests: [not_null, unique]
      - name: year
        tests: [not_null]
      - name: month
        tests: [not_null]
